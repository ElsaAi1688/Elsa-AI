name: Elsa AI Daily

on:
  schedule:
    # 台灣 07:20 更新 Core
    - cron: "20 23 * * *"
    # 台灣 07:30 晨報
    - cron: "30 23 * * *"
    # 台灣 17:30 收盤報
    - cron: "30 9 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "選擇要執行的 Elsa 模式"
        required: true
        default: "morning"
        type: choice
        options:
          - core
          - morning
          - close
          - dashboard
          - alert
          - portfolio
          - health
          - teacher
          - manager
          - dca

jobs:
  elsa-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Elsa
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python elsa.py "${{ github.event.inputs.mode }}"
          else
            python elsa.py core
            python elsa.py morning
          fi
